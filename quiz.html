<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz — CCA-F</title>
<link rel="stylesheet" href="study.css">
<style>
  .opt{display:flex;align-items:flex-start;gap:12px;padding:9px 12px;margin:7px 0;border:2px solid var(--line);border-radius:12px;cursor:pointer;background:#fff}
  .opt:hover{border-color:var(--accent)} .opt input{margin-top:5px;width:20px;height:20px;flex:0 0 auto;accent-color:var(--accent)}
  .opt .ltr{font-weight:800;color:var(--accent)} .opt.correct{border-color:var(--green);background:#EAF7EF} .opt.wrong{border-color:var(--red);background:#FBE9E8}
  .guess{font-size:.8rem;color:var(--muted);margin:4px 0 0 4px;cursor:pointer}
  .why{font-size:.85rem;color:var(--muted);margin:6px 0 0 4px;display:none}
  .why.show{display:block}
  .go{background:var(--green);color:#fff;border:0;border-radius:999px;font:inherit;font-weight:800;padding:12px 26px;font-size:1.02rem;cursor:pointer;margin-top:10px}
  .mini{background:var(--accent);color:#fff;border:0;border-radius:999px;font:inherit;font-weight:700;padding:8px 16px;cursor:pointer;margin:6px 8px 0 0;font-size:.85rem}
</style>
</head>
<body>
<nav class="top" id="site-nav"></nav>
<script src="nav.js"></script>
<div class="wrap">
  <div id="picker" style="display:none">
    <h1>📊 Pick a quiz</h1>
    <div class="card"><ul id="picklist"></ul></div>
  </div>
  <div id="quizview" style="display:none">
    <h1 id="qtitle"></h1>
    <p class="sub"><a href="quizzes.html">← All quizzes</a> · short check · no looking up · tick 🤔 if you guess</p>
    <form id="quiz"></form>
    <button class="go" id="scoreBtn">✅ Score me</button>
    <div class="card" id="results" style="display:none">
      <p style="font-size:1.8rem;font-weight:800" id="score"></p>
      <div class="callout" id="conf"></div>
      <div id="unitdone" style="margin:12px 0"></div>
      <button class="mini" id="copyBtn">📋 Copy results for my tutor</button>
      <button class="mini" id="againBtn">↺ Retake</button>
      <h3>📈 Your attempts</h3>
      <div id="history"></div>
    </div>
  </div>
</div>
<div id="toast" style="position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(30px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;font-weight:700;opacity:0;transition:.25s;pointer-events:none">Copied 👍</div>
<script src="quizzes.js"></script>
<script>
var LETTERS=["A","B","C","D"];
function param(n){var m=new RegExp("[?&]"+n+"=([^&]+)").exec(location.search);return m?decodeURIComponent(m[1]):null;}

// ---- mark-unit-done (quiz -> timeline/course progress chain) ----
var UPATH=["o1","o2","rel","o3","o4","m1","m2","m4","m3","t1","t2","t3","p1","p2","px","a1"];
var UTITLES={o1:"The Agent Loop",o2:"Orchestrator\u2013Workers",rel:"Reliability \u2014 the thread",o3:"An MCP server",o4:"Claude Code workflows",m1:"A structured-output call",m2:"One tool call",m4:"Built-in tools",m3:"Prompt techniques",t1:"Support-agent system",t2:"Research multi-agent system",t3:"PR-review / CI pipeline",p1:"The 6 exam scenarios",p2:"Your capstone build",px:"Anti-patterns & decision frameworks",a1:"Core vocabulary (refresh)"};
function curState(){try{var s=JSON.parse(localStorage.getItem("ccaf-curriculum")||"{}");if(s&&typeof s==="object"){s.done=s.done||{};s.opened=s.opened||{};return s;}}catch(e){}return {done:{},opened:{}};}
function targetUnit(){var u=param("unit");if(u&&UTITLES[u])return u;
  var SETU={foundations:["a1"],prompting:["m1","m3"],"tools-mcp":["o3","m2","m4"],"claude-code":["o4"],agentic:["o1","o2","t1","t2"],reliability:["rel","t3"]};
  var pool=(typeof set!=="undefined"&&set&&SETU[set])?SETU[set]:UPATH;
  for(var i=0;i<UPATH.length;i++){var id=UPATH[i];if(pool.indexOf(id)>=0&&!curState().done[id])return id;}
  return null;}
function stepsFor(u){
  try{if(JSON.parse(localStorage.getItem("ccaf-everdone")||"{}")[u])return {mine:true,n:5,all:true};}catch(e){}
  try{var p=JSON.parse(localStorage.getItem("ccaf-pipeline")||"{}");
    if(p&&p.unit===u&&Array.isArray(p.checks)&&p.checks.length===5)return {mine:true,n:p.checks.filter(Boolean).length,all:p.checks.every(function(v){return !!v;})};}catch(e){}
  try{var m=JSON.parse(localStorage.getItem("ccaf-pipeline-stash")||"{}")||{};
    if(m.unit&&m.checks){var m2={};m2[m.unit]=m.checks;m=m2;}
    if(Array.isArray(m[u])&&m[u].length===5)return {mine:true,n:m[u].filter(Boolean).length,all:m[u].every(function(v){return !!v;})};}catch(e){}
  return {mine:false,n:0,all:false};}
function renderUnitDone(ratio){
  var host=document.getElementById("unitdone"); if(!host) return;
  var u=targetUnit();
  if(!u){host.innerHTML='\u2705 Every unit this quiz covers is already marked done. <a href="timeline.html">See the timeline \u2192</a>';return;}
  if(curState().done[u]){
    host.innerHTML='\u2705 <b>'+UTITLES[u]+'</b> is already marked done. <a href="timeline.html#now">\ud83d\udee4\ufe0f Timeline</a> \u00b7 <a href="today.html">\u25b6\ufe0f Your lesson</a>';
    return;
  }
  var sg=stepsFor(u);
  if(!sg.all){ // THE GATE: quiz result is saved; the 5 lesson steps must also be done before the lesson closes
    host.innerHTML='\u2705 Quiz done for "'+UTITLES[u]+'" \u2014 <b>your score is saved</b>. '+
      (sg.mine?'\ud83d\udccb <b>'+sg.n+' / 5 steps done</b> \u2014 finish the 5 steps on your <a href="today.html">lesson page</a>, then close it there.'
             :'Finish its <a href="today.html">5 lesson steps</a> when it is your current lesson \u2014 then it closes.');
    return;
  }

  var warn=(ratio<0.5)?'<p class="hint" style="margin:.4em 0 0">Under half right \u2014 maybe <a href="curriculum.html#u-'+u+'">review the unit</a> once more first. Your call.</p>':"";
  host.innerHTML='<button type="button" id="udBtn" style="background:var(--green);color:#fff;border:0;border-radius:999px;font:inherit;font-weight:800;padding:12px 22px;font-size:1rem;cursor:pointer">\u2705 Done with \u201c'+UTITLES[u]+'\u201d? Mark the unit complete</button>'+
    '<p class="hint" style="margin:.4em 0 0">This moves your \u2b50 on the timeline and updates your course %.</p>'+warn;
  document.getElementById("udBtn").addEventListener("click",function(){
    var s=curState(); s.done[u]=true;
    try{localStorage.setItem("ccaf-curriculum",JSON.stringify(s));}catch(e){}
    try{var ev0=JSON.parse(localStorage.getItem("ccaf-everdone")||"{}");ev0[u]=true;localStorage.setItem("ccaf-everdone",JSON.stringify(ev0));}catch(e){}
    var n=0; UPATH.forEach(function(id){ if(s.done[id]) n++; });
    host.innerHTML='<b style="font-size:1.1rem">\ud83c\udf89 \u201c'+UTITLES[u]+'\u201d closed! Course progress: '+n+' / 16 units ('+Math.round(n/16*100)+'%).</b><br>'+
      '<button type="button" id="goNextBtn" style="background:var(--green);color:#fff;border:0;border-radius:999px;font:inherit;font-weight:800;padding:10px 20px;font-size:.95rem;cursor:pointer;margin:8px 8px 0 0">\u25b6\ufe0f Start your next lesson now \u2192</button>'+
      '<a href="timeline.html#now">\ud83d\udee4\ufe0f See your \u2b50 move on the timeline</a>'+
      '<p style="margin:.5em 0 0;font-size:.85rem;color:#5C6B7A">Marked by mistake? <a href="#" id="unmarkBtn">\u21a9\ufe0f un-mark \u201c'+UTITLES[u]+'\u201d</a></p>';
    var g=document.getElementById("goNextBtn");
    if(g){g.addEventListener("click",function(){
      // every tick is already in the weekly history (recorded the moment it was made);
      // just clear the finished lesson's steps so the next lesson starts fresh
      try{localStorage.removeItem("ccaf-pipeline");}catch(e){}
      location.href="today.html?started=quiz";
    });}
    var um=document.getElementById("unmarkBtn");
    if(um){um.addEventListener("click",function(ev){ev.preventDefault();
      var s2=curState(); delete s2.done[u];
      try{localStorage.setItem("ccaf-curriculum",JSON.stringify(s2));}catch(e){}
      renderUnitDone(ratio);
    });}
  });
}
var set=param("set");
var banks=window.QUIZ_BANKS||{};
if(!set||!banks[set]){ showPicker(); } else { showQuiz(set); }

function showPicker(){
  document.getElementById("picker").style.display="block";
  var ul=document.getElementById("picklist");
  (window.QUIZ_ORDER||Object.keys(banks)).forEach(function(k){
    var b=banks[k]; if(!b)return;
    var best=bestScore(k);
    var li=document.createElement("li");
    li.innerHTML='<a href="quiz.html?set='+k+'">'+b.emoji+' '+b.title+'</a> <span class="hint">'+(best?('· best '+best.score+'/'+best.total):'· not taken yet')+'</span>';
    ul.appendChild(li);
  });
}
function HKEY(k){return "ccaf-quiz-"+k;}
function history(k){try{return JSON.parse(localStorage.getItem(HKEY(k))||"[]");}catch(e){return [];}}
function bestScore(k){var h=history(k);if(!h.length)return null;return h.reduce(function(a,b){return b.score>a.score?b:a;});}

function showQuiz(k){
  var b=banks[k];
  document.getElementById("quizview").style.display="block";
  document.getElementById("qtitle").textContent=b.emoji+" "+b.title;
  var form=document.getElementById("quiz");
  b.questions.forEach(function(item,qi){
    var card=document.createElement("div");card.className="card";
    var p=document.createElement("p");p.style.fontWeight="700";p.textContent=(qi+1)+". "+item.q;card.appendChild(p);
    item.opts.forEach(function(t,i){
      var lab=document.createElement("label");lab.className="opt";lab.id="o"+qi+"-"+i;
      lab.innerHTML='<input type="radio" name="q'+qi+'" value="'+i+'"><span class="ltr">'+LETTERS[i]+'</span><span>'+t+'</span>';
      card.appendChild(lab);
    });
    var g=document.createElement("label");g.className="guess";g.innerHTML='<input type="checkbox" class="gg"> 🤔 I guessed this';card.appendChild(g);
    var w=document.createElement("div");w.className="why";w.id="why"+qi;w.textContent="💡 "+item.why;card.appendChild(w);
    form.appendChild(card);
  });
  document.getElementById("scoreBtn").addEventListener("click",function(){grade(k);});
  document.getElementById("againBtn").addEventListener("click",function(){location.reload();});
  document.getElementById("copyBtn").addEventListener("click",function(){copyResult(k);});
}

var last=null;
function grade(k){
  var qun=null;
  var b=banks[k],correct=0,guessed=0,missed=[];
  b.questions.forEach(function(item,qi){
    var sel=document.querySelector('input[name="q'+qi+'"]:checked');
    var a=sel?Number(sel.value):null;
    if(document.querySelectorAll('.gg')[qi].checked) guessed++;
    item.opts.forEach(function(_,i){var el=document.getElementById("o"+qi+"-"+i);el.classList.remove("correct","wrong");});
    document.getElementById("o"+qi+"-"+item.ans).classList.add("correct");
    document.getElementById("why"+qi).classList.add("show");
    if(a===item.ans){correct++;} else {missed.push(qi+1); if(a!==null) document.getElementById("o"+qi+"-"+a).classList.add("wrong");}
  });
  var total=b.questions.length;
  last={k:k,score:correct,total:total,guessed:guessed,missed:missed};
  var hist=history(k); hist.push({ts:new Date().toLocaleString(),score:correct,total:total,guessed:guessed});
  try{localStorage.setItem(HKEY(k),JSON.stringify(hist));}catch(e){}
  // save the result AGAINST THE UNIT it was taken for — a lesson's first close requires this record
  try{qun=targetUnit();if(qun){var qd0=JSON.parse(localStorage.getItem("ccaf-quizdone")||"{}");
    qd0[qun]={score:correct,total:total,guessed:guessed,set:k,ts:new Date().toLocaleDateString()};
    localStorage.setItem("ccaf-quizdone",JSON.stringify(qd0));}}catch(e){}
  document.getElementById("score").textContent="Score: "+correct+" / "+total;
  var c=document.getElementById("conf");
  var secure=correct-Math.min(guessed,correct);
  c.className="callout "+(correct/total>=0.8?"ok":(correct/total>=0.5?"tip":"warn"));
  c.innerHTML="<b>"+(correct===total?"Perfect! 🎉":(correct/total>=0.8?"Strong.":(correct/total>=0.5?"Getting there.":"Early days — that's fine.")))+"</b> You guessed on "+guessed+". Confident correct ≈ "+Math.max(0,secure)+". The 💡 notes under each question explain the right answer."+
    (qun&&UTITLES[qun]?'<br>🧾 This take counts for: <b>'+UTITLES[qun]+'</b> — saved.':'');
  document.getElementById("results").style.display="block";
  document.getElementById("results").scrollIntoView({behavior:"smooth"});
  renderHistory(k);
  renderUnitDone(correct/total);
}
function renderHistory(k){
  var h=history(k); var html="<ul>";
  h.slice(-8).reverse().forEach(function(a){html+="<li>"+a.score+"/"+a.total+" <span class='hint'>("+a.guessed+" guessed · "+a.ts+")</span></li>";});
  html+="</ul>"; document.getElementById("history").innerHTML=html;
}
function copyResult(k){
  if(!last)return; var b=banks[k];
  var t="Quiz: "+b.title+". Score "+last.score+"/"+last.total+", guessed "+last.guessed+
    (last.missed.length?(". I missed Q"+last.missed.join(", Q")):". Missed none")+
    ". Please re-quiz me on what I missed and explain those, then update where I'm at.";
  var tEl=document.getElementById("toast");
  function ok(){tEl.style.opacity="1";tEl.style.transform="translateX(-50%) translateY(0)";setTimeout(function(){tEl.style.opacity="0";tEl.style.transform="translateX(-50%) translateY(30px)";},1500);}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(ok).catch(function(){fb(t,ok);});}else{fb(t,ok);}
}
function fb(t,ok){var ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");}catch(e){}ta.remove();ok();}
</script>
</body>
</html>
