<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Quiz — CCA-F</title>
<link rel="stylesheet" href="study.css">
<style>
  .opt{display:flex;align-items:flex-start;gap:12px;padding:9px 12px;margin:7px 0;border:2px solid var(--line);border-radius:8px;cursor:pointer;background:#fff}
  .opt:hover{border-color:var(--accent)} .opt input{margin-top:5px;width:20px;height:20px;flex:0 0 auto;accent-color:var(--accent)}
  .opt .ltr{font-weight:800;color:var(--accent)} .opt.correct{border-color:var(--green);background:#EAF7EF} .opt.wrong{border-color:var(--red);background:#FBE9E8}
  .guess{font-size:.8rem;color:var(--muted);margin:4px 0 0 4px;cursor:pointer}
  .why{font-size:.85rem;color:var(--muted);margin:6px 0 0 4px;display:none}
  .why.show{display:block}
  .go{background:var(--green);color:#fff;border:0;border-radius:7px;font:inherit;font-weight:800;padding:12px 26px;font-size:1.02rem;cursor:pointer;margin-top:10px}
  .mini{background:var(--accent);color:#fff;border:0;border-radius:7px;font:inherit;font-weight:700;padding:8px 16px;cursor:pointer;margin:6px 8px 0 0;font-size:.85rem}
</style>
</head>
<body>
<nav class="top" id="site-nav"></nav>
<script src="course-data.js"></script>
<script src="nav.js"></script>
<div class="wrap">
  <div id="picker" style="display:none">
    <h1>📊 Pick a quiz</h1>
    <div class="card"><ul id="picklist"></ul></div>
  </div>
  <div id="quizview" style="display:none">
    <h1 id="qtitle"></h1>
    <p class="sub"><a href="quizzes.html">← All quizzes</a> · short check · no looking up · tick 🤔 if you guess</p>
    <form id="quiz"></form>
    <button class="go" id="scoreBtn">✅ Score me</button>
    <div class="card" id="results" style="display:none">
      <p style="font-size:1.8rem;font-weight:800" id="score"></p>
      <div class="callout" id="conf"></div>
      <div id="unitdone" style="margin:12px 0"></div>
      <button class="mini" id="copyBtn">📋 Copy results for my tutor</button>
      <button class="mini" id="againBtn">↺ Retake</button>
      <h3>📈 Your attempts</h3>
      <div id="history"></div>
    </div>
  </div>
</div>
<div id="toast" style="position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(30px);background:var(--ink);color:#fff;padding:10px 18px;border-radius:10px;font-weight:700;opacity:0;transition:.25s;pointer-events:none">Copied 👍</div>
<script src="quizzes.js"></script>
<script src="lesson-quizzes.js"></script>
<script>
var LETTERS=["A","B","C","D"];
function param(n){var m=new RegExp("[?&]"+n+"=([^&]+)").exec(location.search);return m?decodeURIComponent(m[1]):null;}

// ---- mark-unit-done (quiz -> timeline/course progress chain) ----
var UPATH=(window.CCAF&&CCAF.ORDER)?CCAF.ORDER.slice():["o1","a1","a2","m3","m1","m2","m4","o3","o4","o2","rel","t1","t2","p1","px","p2"];
var UTITLES=(window.CCAF&&CCAF.TITLES)?CCAF.TITLES:{};
function curState(){try{var s=JSON.parse(localStorage.getItem("ccaf-curriculum")||"{}");if(s&&typeof s==="object"){s.done=s.done||{};s.opened=s.opened||{};return s;}}catch(e){}return {done:{},opened:{}};}
function targetUnit(){var u=param("unit");if(u&&UTITLES[u])return u;
  var SETU={"digital-foundations":["w1","w2","w3","w4","w5"],foundations:["a1","a2"],prompting:["m3","m1"],"developer-bridge":["d1","d2"],"tools-mcp":["m2","m4","o3"],"claude-code":["o4"],agentic:["o1","o2","t1","t2"],reliability:["rel"]};
  var pool=(typeof set!=="undefined"&&set&&SETU[set])?SETU[set]:UPATH;
  for(var i=0;i<UPATH.length;i++){var id=UPATH[i];if(pool.indexOf(id)>=0&&!curState().done[id])return id;}
  return null;}
function stepsFor(u){
  if(window.CCAF)return CCAF.stepsFor(u); // everdone → ccaf-steps (the one real step store)
  try{if(JSON.parse(localStorage.getItem("ccaf-everdone")||"{}")[u])return {mine:true,n:5,all:true};}catch(e){}
  return {mine:false,n:0,all:false};}
function renderUnitDone(ratio){
  var host=document.getElementById("unitdone"); if(!host) return;
  var u=targetUnit();
  if(!u){host.innerHTML='\u2705 Every unit this quiz covers is already marked done. <a href="timeline.html">See the timeline \u2192</a>';return;}
  if(curState().done[u]){
    host.innerHTML='\u2705 <b>'+UTITLES[u]+'</b> is already marked done. <a href="timeline.html#now">\ud83d\udee4\ufe0f Timeline</a> \u00b7 <a href="today.html">\u25b6\ufe0f Your lesson</a>';
    return;
  }
  var mr=window.CCAF?CCAF.mastery(u):null,sg=mr?mr.steps:stepsFor(u);
  if(mr&&!mr.mastered){
    host.innerHTML='<b>Your take is saved. Mastery needs four kinds of evidence:</b><br>'+
      (sg.all?'\u2705':'\u2b1c')+' five lesson steps ('+sg.n+'/5)<br>'+
      (mr.quizOK?'\u2705':'\u2b1c')+' quiz at least 80% with zero guesses'+(mr.quiz&&mr.quiz.total?' (latest '+mr.quiz.score+'/'+mr.quiz.total+', '+Number(mr.quiz.guessed||0)+' guessed)':'')+'<br>'+
      (mr.buildOK?'\u2705':'\u2b1c')+' <a href="exercise.html?id='+(CCAF.COURSE&&CCAF.COURSE.map[u]?CCAF.COURSE.map[u].exercise:'')+'">independent build</a><br>'+
      (mr.teachOK?'\u2705':'\u2b1c')+' <a href="teachback.html?unit='+u+'">60-second teach-back</a><br>'+
      '<span class="hint">Guided work still counts as learning. It just does not claim independent mastery yet.</span>';
    return;
  }
  var _ev=false;try{_ev=!!(JSON.parse(localStorage.getItem("ccaf-everdone")||"{}")[u]);}catch(e){}
  var _cu=window.CCAF?CCAF.cur():u;
  if(!_ev&&u!==_cu){ // council rule: first closes happen IN ORDER; working ahead saves, closing waits
    host.innerHTML='\ud83d\udd12 <b>"'+UTITLES[u]+'" is ready</b> \u2014 steps \u2713 and quiz saved. It unlocks the moment you close the lessons before it. Your \u2b50 NOW lesson: <b>'+(UTITLES[_cu]||"\u2014")+'</b> \u00b7 <a href="today.html">\u25b6\ufe0f go close it</a> \u2014 nothing gets lost.';
    return;
  }

  var warn=(ratio<0.5)?'<p class="hint" style="margin:.4em 0 0">Under half right \u2014 maybe <a href="curriculum.html#u-'+u+'">review the unit</a> once more first. Your call.</p>':"";
  host.innerHTML='<button type="button" id="udBtn" style="background:var(--green);color:#fff;border:0;border-radius:7px;font:inherit;font-weight:800;padding:12px 22px;font-size:1rem;cursor:pointer">\u2705 Done with \u201c'+UTITLES[u]+'\u201d? Mark the unit complete</button>'+
    '<p class="hint" style="margin:.4em 0 0">This moves your \u2b50 on the timeline and updates your course %.</p>'+warn;
  document.getElementById("udBtn").addEventListener("click",function(){
    var s=curState(); s.done[u]=true;
    try{localStorage.setItem("ccaf-curriculum",JSON.stringify(s));}catch(e){}
    try{var ev0=JSON.parse(localStorage.getItem("ccaf-everdone")||"{}");ev0[u]=true;localStorage.setItem("ccaf-everdone",JSON.stringify(ev0));}catch(e){}
    if(window.CCAF)CCAF.syncPipeline(); // the mirror moves on to the new NOW lesson
    var n=0; UPATH.forEach(function(id){ if(s.done[id]) n++; });
    host.innerHTML='<b style="font-size:1.1rem">\ud83c\udf89 \u201c'+UTITLES[u]+'\u201d closed! Course progress: '+n+' / '+UPATH.length+' units ('+Math.round(n/UPATH.length*100)+'%).</b><br>'+
      '<button type="button" id="goNextBtn" style="background:var(--green);color:#fff;border:0;border-radius:7px;font:inherit;font-weight:800;padding:10px 20px;font-size:.95rem;cursor:pointer;margin:8px 8px 0 0">\u25b6\ufe0f Start your next lesson now \u2192</button>'+
      '<a href="timeline.html#now">\ud83d\udee4\ufe0f See your \u2b50 move on the timeline</a>'+
      '<p style="margin:.5em 0 0;font-size:.85rem;color:#5C6B7A">Marked by mistake? <a href="#" id="unmarkBtn">\u21a9\ufe0f un-mark \u201c'+UTITLES[u]+'\u201d</a></p>';
    var g=document.getElementById("goNextBtn");
    if(g){g.addEventListener("click",function(){
      // per-lesson steps persist in ccaf-steps; just repoint the mirror at the new NOW lesson
      if(window.CCAF)CCAF.syncPipeline();
      location.href="today.html?started=quiz";
    });}
    var um=document.getElementById("unmarkBtn");
    if(um){um.addEventListener("click",function(ev){ev.preventDefault();
      var s2=curState(); delete s2.done[u];
      try{localStorage.setItem("ccaf-curriculum",JSON.stringify(s2));}catch(e){}
      if(window.CCAF)CCAF.syncPipeline();
      renderUnitDone(ratio);
    });}
  });
}
var set=param("set");
var uparam=param("unit");
var banks=window.QUIZ_BANKS||{};
var LB=window.LESSON_BANKS||{};
if(window.CCAF_COURSE&&CCAF_COURSE.banks){Object.keys(CCAF_COURSE.banks).forEach(function(k){LB[k]=CCAF_COURSE.banks[k];});}
function combinedBank(id,title,phase,ids){var qs=[];ids.forEach(function(u){if(LB[u])qs=qs.concat(LB[u].questions);});banks[id]={title:title,emoji:"CHECK",phase:phase,questions:qs};}
combinedBank("digital-foundations","Digital foundations check","Foundation Workbench",["w1","w2","w3","w4","w5"]);
combinedBank("developer-bridge","Developer bridge check","Developer Bridge",["d1","d2"]);
// which lessons feed each checkpoint set (same map as targetUnit uses)
var SETU2={"digital-foundations":["w1","w2","w3","w4","w5"],foundations:["a1","a2"],prompting:["m3","m1"],"developer-bridge":["d1","d2"],"tools-mcp":["m2","m4","o3"],"claude-code":["o4"],agentic:["o1","o2","t1","t2"],reliability:["rel"]};
// The list actually served this run: sampled fresh + answer positions shuffled,
// so scores mean knowledge — not remembered letter positions.
var QLIST=null, HK=null, QTITLE=null;
function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}
function shufOpts(q){var idx=shuffle([0,1,2,3]);
  return {q:q.q,opts:idx.map(function(i){return q.opts[i];}),ans:idx.indexOf(q.ans),why:q.why};}
function buildLesson(u){
  QTITLE="\ud83d\udcd8 "+UTITLES[u]+" \u2014 lesson quiz";
  HK="ccaf-quiz-u-"+u;
  QLIST=shuffle(LB[u].questions.slice()).map(shufOpts);
}
function buildSet(k){
  var b=banks[k];
  QTITLE=b.emoji+" "+b.title;
  HK=HKEY(k);
  var pool=b.questions.slice();
  if(k!=="digital-foundations"&&k!=="developer-bridge"){
    (SETU2[k]||[]).forEach(function(u){ if(LB[u]&&LB[u].questions) pool=pool.concat(LB[u].questions); });
  }
  QLIST=shuffle(pool).slice(0,10).map(shufOpts);
}
if(uparam&&UTITLES[uparam]&&LB[uparam]&&LB[uparam].questions&&LB[uparam].questions.length){ buildLesson(uparam); showQuiz(); }
else if(set&&banks[set]){ buildSet(set); showQuiz(); }
else { showPicker(); }

function showPicker(){
  document.getElementById("picker").style.display="block";
  var ul=document.getElementById("picklist");
  (window.QUIZ_ORDER||Object.keys(banks)).forEach(function(k){
    var b=banks[k]; if(!b)return;
    var best=bestScore(k);
    var li=document.createElement("li");
    li.innerHTML='<a href="quiz.html?set='+k+'">'+b.emoji+' '+b.title+'</a> <span class="hint">'+(best?('· best '+best.score+'/'+best.total):'· not taken yet')+'</span>';
    ul.appendChild(li);
  });
}
function HKEY(k){return "ccaf-quiz-"+k;}
function history(hk){try{return JSON.parse(localStorage.getItem(hk)||"[]");}catch(e){return [];}}
function bestScore(k){var h=history(HKEY(k));if(!h.length)return null;return h.reduce(function(a,b){return b.score>a.score?b:a;});}

function showQuiz(){
  document.getElementById("quizview").style.display="block";
  document.getElementById("qtitle").textContent=QTITLE;
  var form=document.getElementById("quiz");
  QLIST.forEach(function(item,qi){
    var card=document.createElement("div");card.className="card";
    var p=document.createElement("p");p.style.fontWeight="700";p.textContent=(qi+1)+". "+item.q;card.appendChild(p);
    item.opts.forEach(function(t,i){
      var lab=document.createElement("label");lab.className="opt";lab.id="o"+qi+"-"+i;
      lab.innerHTML='<input type="radio" name="q'+qi+'" value="'+i+'"><span class="ltr">'+LETTERS[i]+'</span><span>'+t+'</span>';
      card.appendChild(lab);
    });
    var g=document.createElement("label");g.className="guess";g.innerHTML='<input type="checkbox" class="gg"> 🤔 I guessed this';card.appendChild(g);
    var w=document.createElement("div");w.className="why";w.id="why"+qi;w.textContent="💡 "+item.why;card.appendChild(w);
    form.appendChild(card);
  });
  document.getElementById("scoreBtn").addEventListener("click",function(){grade();});
  document.getElementById("againBtn").addEventListener("click",function(){location.reload();}); // reload = fresh draw + fresh option order
  document.getElementById("copyBtn").addEventListener("click",function(){copyResult();});
}

var last=null;
function grade(){
  var qun=null;
  var correct=0,guessed=0,guessedCorrect=0,missed=[],reviewCards=[];
  QLIST.forEach(function(item,qi){
    var sel=document.querySelector('input[name="q'+qi+'"]:checked');
    var a=sel?Number(sel.value):null;
    var wasGuess=document.querySelectorAll('.gg')[qi].checked;
    if(wasGuess) guessed++;
    item.opts.forEach(function(_,i){var el=document.getElementById("o"+qi+"-"+i);el.classList.remove("correct","wrong");});
    document.getElementById("o"+qi+"-"+item.ans).classList.add("correct");
    document.getElementById("why"+qi).classList.add("show");
    if(a===item.ans){correct++;if(wasGuess)guessedCorrect++;} else {missed.push(qi+1); if(a!==null) document.getElementById("o"+qi+"-"+a).classList.add("wrong");}
    if(wasGuess||a!==item.ans){reviewCards.push({id:(HK+"-"+qi+"-"+item.q.slice(0,24)).replace(/[^a-zA-Z0-9-]/g,"-"),unit:targetUnit()||"general",front:item.q,back:item.opts[item.ans]+". "+item.why,source:wasGuess&&a===item.ans?"guessed-correct":"missed"});}
  });
  var total=QLIST.length;
  last={score:correct,total:total,guessed:guessed,missed:missed};
  var hist=history(HK); hist.push({ts:new Date().toLocaleString(),score:correct,total:total,guessed:guessed});
  try{localStorage.setItem(HK,JSON.stringify(hist));}catch(e){}
  try{var rc0=JSON.parse(localStorage.getItem("ccaf-mistake-cards")||"{}");reviewCards.forEach(function(c){rc0[c.id]=c;});localStorage.setItem("ccaf-mistake-cards",JSON.stringify(rc0));}catch(e){}
  // save the result AGAINST THE UNIT it was taken for — a lesson's first close requires this record
  try{qun=targetUnit();if(qun){var qd0=JSON.parse(localStorage.getItem("ccaf-quizdone")||"{}");
    qd0[qun]={score:correct,total:total,guessed:guessed,set:HK,ts:new Date().toLocaleDateString()};
    localStorage.setItem("ccaf-quizdone",JSON.stringify(qd0));}}catch(e){}
  document.getElementById("score").textContent="Score: "+correct+" / "+total;
  var c=document.getElementById("conf");
  var secure=correct-guessedCorrect;
  c.className="callout "+(correct/total>=0.8?"ok":(correct/total>=0.5?"tip":"warn"));
  c.innerHTML="<b>"+(correct===total?"Perfect! 🎉":(correct/total>=0.8?"Strong.":(correct/total>=0.5?"Getting there.":"Early days — that's fine.")))+"</b> You guessed on "+guessed+". Confident correct ≈ "+Math.max(0,secure)+". The 💡 notes under each question explain the right answer."+
    (qun&&UTITLES[qun]?'<br>🧾 This take counts for: <b>'+UTITLES[qun]+'</b> — saved.':'');
  document.getElementById("results").style.display="block";
  document.getElementById("results").scrollIntoView({behavior:"smooth"});
  renderHistory();
  renderUnitDone(correct/total);
}
function renderHistory(){
  var h=history(HK); var html="<ul>";
  h.slice(-8).reverse().forEach(function(a){html+="<li>"+a.score+"/"+a.total+" <span class='hint'>("+a.guessed+" guessed · "+a.ts+")</span></li>";});
  html+="</ul>"; document.getElementById("history").innerHTML=html;
}
function copyResult(){
  if(!last)return;
  var t="Quiz: "+QTITLE+". Score "+last.score+"/"+last.total+", guessed "+last.guessed+
    (last.missed.length?(". I missed Q"+last.missed.join(", Q")):". Missed none")+
    ". Please re-quiz me on what I missed and explain those, then update where I'm at.";
  var tEl=document.getElementById("toast");
  function ok(){tEl.style.opacity="1";tEl.style.transform="translateX(-50%) translateY(0)";setTimeout(function(){tEl.style.opacity="0";tEl.style.transform="translateX(-50%) translateY(30px)";},1500);}
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(t).then(ok).catch(function(){fb(t,ok);});}else{fb(t,ok);}
}
function fb(t,ok){var ta=document.createElement("textarea");ta.value=t;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");}catch(e){}ta.remove();ok();}
</script>
</body>
</html>
