<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Foundation Workbench | CCA-F</title>
<link rel="stylesheet" href="study.css">
<style>
  .labhead{padding:28px 0 8px}
  .eyebrow{font-weight:800;color:var(--accent);font-size:.86rem}
  .plain{font-size:1.12rem;line-height:1.55;max-width:54ch;margin:0}
  .visual-lesson{display:grid;grid-template-columns:minmax(0,1.35fr) minmax(250px,.65fr);gap:18px;align-items:stretch;margin:14px 0 22px}
  .scene{min-height:330px;background:#F5F8FA;border:2px solid var(--line);padding:20px;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .idea{background:#fff;border-left:7px solid var(--accent);padding:18px;display:flex;flex-direction:column;justify-content:center;min-width:0}
  .idea h2{font-size:1rem;margin:0 0 8px;color:var(--muted)}
  .window{width:min(100%,620px);background:#fff;border:2px solid #26303B;box-shadow:8px 8px 0 #C9D5DE}
  .windowbar{height:34px;background:#26303B;color:#fff;display:flex;align-items:center;padding:0 12px;font-size:.78rem;font-weight:800}
  .windowbody{padding:18px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;line-height:1.7}
  .finder{display:grid;grid-template-columns:125px 1fr;min-height:230px}.sidebar{background:#EAF0F4;padding:14px;font-size:.76rem;line-height:1.9;font-weight:700}.files{padding:18px;display:grid;grid-template-columns:repeat(2,minmax(90px,1fr));gap:12px;align-content:start}
  .filetile{border:2px solid var(--line);background:#fff;padding:16px 8px;text-align:center;font-size:.8rem;line-height:1.35;font-weight:800}.filetile.active{border-color:#16877A;background:#E7F5F3}.foldericon{display:block;width:52px;height:34px;background:#E0A106;margin:0 auto 9px;position:relative}.foldericon:before{content:"";position:absolute;left:0;top:-8px;width:24px;height:10px;background:#E0A106}
  .code-line{white-space:pre-wrap}.key{color:#2D7DD2;font-weight:800}.value{color:#16877A}.punct{color:#D64545;font-weight:900}.number{color:#8A4FC4;font-weight:800}
  .machine{display:grid;grid-template-columns:1fr auto 1.2fr auto 1fr;gap:14px;align-items:center;width:100%;font-weight:800;text-align:center}.machinebox{border:3px solid var(--accent);background:#fff;padding:24px 12px}.arrow{font-size:2rem;color:var(--accent)}
  .api-scene{display:grid;grid-template-columns:1fr 1.4fr 1fr;gap:16px;align-items:center;width:100%;text-align:center}.device,.service{border:3px solid #26303B;background:#fff;padding:26px 12px;font-weight:800}.envelopes{display:grid;gap:38px}.envelope{position:relative;background:#fff;border:3px solid var(--accent);padding:12px 8px;font-weight:800;font-size:.8rem}.envelope:after{content:"->";position:absolute;right:-18px}.envelope.back:after{content:"<-";right:auto;left:-18px}
  .terminal{width:min(100%,620px);background:#151A1F;color:#EAF7EF;border:3px solid #26303B;padding:20px;font:700 1rem/1.8 ui-monospace,SFMono-Regular,Menlo,monospace}.prompt{color:#70D7B5}.output{color:#C8D5DF}.ok{color:#FFE082}
  .diff .minus{background:#FBE9E8;color:#9F2D2D}.diff .plus{background:#EAF7EF;color:#176B40}.diff div{padding:7px 10px}
  .prflow{display:grid;grid-template-columns:repeat(6,minmax(76px,1fr));gap:20px;align-items:center;width:100%}.prstep{position:relative;border:2px solid var(--accent);background:#fff;padding:18px 7px;text-align:center;font-weight:800;font-size:.8rem}.prstep:not(:last-child):after{content:"->";position:absolute;right:-18px;color:var(--accent);font-size:1.2rem}
  .diagram{display:grid;grid-template-columns:repeat(4,minmax(120px,1fr));gap:34px;align-items:center;margin:20px 0}
  .box{position:relative;border:3px solid var(--accent);background:#fff;padding:18px 12px;text-align:center;font-weight:800;min-height:84px;display:flex;align-items:center;justify-content:center}
  .box:not(:last-child)::after{content:"->";position:absolute;right:-31px;top:50%;transform:translateY(-50%);font-size:1.4rem;color:var(--muted)}
  .danger{border-left:7px solid var(--red);background:#FBE9E8;padding:14px 18px;margin:18px 0}
  .example{border-left:7px solid var(--green);background:#EAF7EF;padding:14px 18px;margin:18px 0;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;overflow-wrap:anywhere}
  .termgrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
  .term{border:1px solid var(--line);background:#fff;padding:14px 16px}
  .actions{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0}
  button,.action{font:inherit;font-weight:800;border:0;border-radius:7px;padding:11px 18px;cursor:pointer;text-decoration:none;display:inline-block}
  .speak{background:var(--accent);color:#fff}.done{background:var(--green);color:#fff}.next{background:#fff;color:var(--ink);border:2px solid var(--line)}
  .read-text{min-height:8.6em}
  .read-word{border-radius:4px;box-decoration-break:clone;-webkit-box-decoration-break:clone;transition:background-color .12s ease,box-shadow .12s ease}
  .read-word.is-active{background:#FFE082;box-shadow:0 0 0 3px #FFE082;color:#17222A}
  .read-controls{display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;margin:18px 0 10px}
  .read-play{min-width:116px}
  .read-restart{width:49px;height:49px;padding:0;display:inline-flex;align-items:center;justify-content:center;font-size:1.4rem}
  .speed-control{display:grid;gap:3px;min-width:90px}
  .speed-control label{font-size:.72rem;color:var(--muted);font-weight:800}
  .speed-control select{min-height:49px;border:2px solid var(--line);border-radius:7px;background:#fff;color:var(--ink);font:inherit;font-weight:800;padding:6px 28px 6px 10px;cursor:pointer}
  .read-progress{width:100%;height:28px;margin:0;accent-color:var(--accent);cursor:pointer}
  .read-progress:disabled{cursor:not-allowed;opacity:.5}
  .read-meta{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:.72rem;font-weight:800}
  .voice-name{color:var(--accent)}
  @media(max-width:800px){.visual-lesson{grid-template-columns:1fr}.scene{min-height:280px}.prflow{grid-template-columns:repeat(3,1fr)}.prstep:nth-child(3):after{display:none}}
  @media(max-width:700px){.diagram{grid-template-columns:1fr;gap:30px}.box:not(:last-child)::after{content:"down";right:auto;left:50%;top:auto;bottom:-30px;transform:translateX(-50%);font-size:.78rem}.termgrid{grid-template-columns:1fr}.machine{grid-template-columns:1fr}.arrow{transform:rotate(90deg)}.api-scene{grid-template-columns:1fr}.envelope:after,.envelope.back:after{content:"down";left:50%;right:auto;bottom:-28px;top:auto}.finder{grid-template-columns:92px 1fr}.files{grid-template-columns:1fr}.prflow{grid-template-columns:1fr}.prstep:not(:last-child):after{content:"down";display:block;right:auto;left:50%;bottom:-20px}}
</style>
</head>
<body>
<nav class="top" id="site-nav"></nav>
<script src="course-data.js"></script>
<script src="nav.js"></script>
<script src="read-aloud.js"></script>
<main class="wrap">
  <header class="labhead">
    <div class="eyebrow" id="level">Foundation Workbench</div>
    <h1 id="title">Loading lesson</h1>
    <p class="sub" id="one"></p>
  </header>

  <div id="lesson-flow"></div>

  <section class="visual-lesson" aria-label="Visual lesson">
    <div class="scene" id="scene" role="img" aria-describedby="plain"></div>
    <div class="idea">
      <h2>One idea</h2>
      <p class="plain read-text" id="plain" data-read-text></p>
      <audio data-read-audio></audio>
      <div class="read-controls">
        <button class="speak read-play" data-read-play type="button"><span aria-hidden="true">▶</span> Listen</button>
        <button class="next read-restart" data-read-restart type="button" aria-label="Restart narration" title="Restart narration">↺</button>
        <div class="speed-control">
          <label for="read-speed">Speed</label>
          <select id="read-speed" data-read-speed aria-label="Narration speed">
            <option value="0.75">0.75×</option>
            <option value="1" selected>1×</option>
            <option value="1.25">1.25×</option>
            <option value="1.5">1.5×</option>
            <option value="2">2×</option>
          </select>
        </div>
      </div>
      <input class="read-progress" data-read-progress type="range" min="0" max="1000" value="0" step="1" aria-label="Narration position">
      <div class="read-meta"><span data-read-time>0:00 / 0:00</span><span class="voice-name">Arthur · ElevenLabs</span></div>
      <p class="sr-only" data-read-status aria-live="polite"></p>
    </div>
  </section>

  <section>
    <h2>See the flow</h2>
    <div class="diagram" id="diagram"></div>
  </section>

  <section>
    <h2>Tiny example</h2>
    <div class="example" id="example"></div>
  </section>

  <details>
    <summary><b>Open the 3 word cards</b></summary>
    <div class="termgrid" id="terms"></div>
  </details>

  <div class="danger"><b>Watch out:</b> <span id="danger"></span></div>

  <div class="actions">
    <button class="done" id="watched" type="button">Mark learn step complete</button>
  </div>

  <div id="next-step"></div>

  <footer><a href="today.html">Back to your lesson</a></footer>
</main>
<script>
(function(){
  function param(n){var m=new RegExp("[?&]"+n+"=([^&]+)").exec(location.search);return m?decodeURIComponent(m[1]):null;}
  var C=window.CCAF_COURSE,u=param("unit"),unit=C&&C.map[u],lesson=C&&C.lessons[u];
  if(!unit||!lesson){u="w1";unit=C.map[u];lesson=C.lessons[u];}
  document.title=unit.title+" | Foundation Workbench";
  document.getElementById("level").textContent=unit.level;
  document.getElementById("title").textContent=unit.title;
  document.getElementById("one").textContent=unit.one;
  document.getElementById("plain").textContent=lesson.plain;
  document.getElementById("example").textContent=lesson.example;
  document.getElementById("danger").textContent=lesson.danger;
  var scenes={
    w1:'<div class="window"><div class="windowbar">Finder | study folder</div><div class="finder"><div class="sidebar">Documents<br><b>study</b><br>Downloads</div><div class="files"><div class="filetile"><span class="foldericon"></span>notes</div><div class="filetile active">{ }<br>practice-profile.json</div></div></div></div>',
    w2:'<div class="window"><div class="windowbar">practice-profile.json</div><div class="windowbody"><div class="code-line"><span class="punct">{</span></div><div class="code-line">  <span class="key">"name"</span><span class="punct">:</span> <span class="value">"Learner"</span><span class="punct">,</span></div><div class="code-line">  <span class="key">"hours"</span><span class="punct">:</span> <span class="number">20</span></div><div class="code-line"><span class="punct">}</span></div></div></div>',
    w3:'<div class="machine"><div class="machinebox">Input<br><span class="hint">2 and 3</span></div><div class="arrow">-&gt;</div><div class="machinebox">total( )<br><span class="hint">named action</span></div><div class="arrow">-&gt;</div><div class="machinebox">Output<br><span class="hint">5</span></div></div>',
    w4:'<div class="api-scene"><div class="device">Your app</div><div class="envelopes"><div class="envelope">Request<br>GET /weather</div><div class="envelope back">Response<br>200 + JSON</div></div><div class="service">Weather API</div></div>',
    w5:'<div class="terminal"><div><span class="prompt">$</span> pwd</div><div class="output">/Users/learner/Documents/study</div><div><span class="prompt">$</span> ls</div><div class="ok">practice-profile.json</div></div>',
    d1:'<div class="window diff"><div class="windowbar">refund-limit.js | diff</div><div class="windowbody"><div class="minus">- const limit = 100;</div><div class="plus">+ const limit = 500;</div><div class="output">Changed behavior: 100 -&gt; 500</div></div></div>',
    d2:'<div class="prflow"><div class="prstep">Branch</div><div class="prstep">Edit</div><div class="prstep">Commit</div><div class="prstep">Pull request</div><div class="prstep">CI + review</div><div class="prstep">Merge</div></div>'
  };
  var scene=document.getElementById("scene");
  scene.setAttribute("aria-label","Concept model, not a product screenshot. "+lesson.plain);
  scene.innerHTML=scenes[u]||'<div class="machine"><div class="machinebox">Input</div><div class="arrow">-&gt;</div><div class="machinebox">Work</div><div class="arrow">-&gt;</div><div class="machinebox">Output</div></div>';
  document.getElementById("diagram").innerHTML=lesson.diagram.map(function(x){return '<div class="box">'+x+'</div>';}).join("");
  var cards=C.cards[u]||[];
  document.getElementById("terms").innerHTML=cards.map(function(x){return '<div class="term"><b>'+x[0]+'</b><br><span class="hint">'+x[1]+'</span></div>';}).join("");
  if(window.CCAFFlow)CCAFFlow.mount("lesson-flow",{unit:u,stage:"learn"});
  window.CCAFReadAloud.mount({
    root:document.querySelector(".idea"),
    text:lesson.plain,
    src:"audio/foundation/"+u+"-one-idea.mp3"
  });
  var watched=document.getElementById("watched");
  function showNext(){if(window.CCAFFlow){CCAFFlow.mount("lesson-flow",{unit:u,stage:"learn"});CCAFFlow.mountNext("next-step",u,{stage:"draw",context:"Learn step complete.",label:"Next: draw it"});}}
  if(window.CCAF&&CCAF.getSteps(u)[0]){watched.textContent="Learn step complete";watched.disabled=true;showNext();}
  watched.addEventListener("click",function(){if(window.CCAF){CCAF.setStep(u,0,true);CCAF.recordEvidence(u,"watch",{complete:true});}watched.textContent="Learn step complete";watched.disabled=true;showNext();});
  try{localStorage.setItem("ccaf-last",JSON.stringify({href:"foundation-lab.html?unit="+u,label:"Lesson: "+unit.title,ts:Date.now()}));}catch(e){}
})();
</script>
</body>
</html>
