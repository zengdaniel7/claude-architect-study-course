name: Publish Studio preview

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Enable pinned pnpm
        run: corepack enable && corepack prepare pnpm@11.7.0 --activate
      - name: Install project dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Studio server dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium
      - name: Run release quality gate
        env:
          CI: true
          CCA_STUDIO_VERBOSE: "1"
        run: pnpm test
  build:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Enable pinned pnpm
        run: corepack enable && corepack prepare pnpm@11.7.0 --activate
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Build AI-disabled preview
        env:
          VITE_CCAF_PUBLIC_PREVIEW: "true"
        run: pnpm run studio:build && pnpm run studio:preview:check
      - uses: actions/upload-pages-artifact@v3
        with:
          path: studio/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
