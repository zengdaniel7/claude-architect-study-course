<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Draw the lesson | CCA-F</title>
<link rel="stylesheet" href="study.css">
<style>
  .draw-head{padding:28px 0 6px}
  .draw-prompt{border-left:7px solid var(--accent);background:#E7F0FB;padding:16px 18px;margin:16px 0}
  .concept-chain{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:12px}
  .concept-box{border:2px solid var(--accent);background:#fff;padding:7px 11px;font-weight:800}
  .concept-arrow{color:var(--accent);font-weight:900}
  .sketch-tool{border:2px solid var(--line);background:#fff;padding:12px;margin:16px 0}
  .sketch-toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:10px}
  .color-tools{display:flex;align-items:center;gap:7px;border:0;padding:0;margin:0}
  .color-tools legend{font-size:.8rem;font-weight:800;margin-right:2px}
  .swatch{width:38px;height:38px;border:3px solid #fff;box-shadow:0 0 0 1px var(--line);background:var(--swatch);cursor:pointer;padding:0}
  .swatch[aria-pressed="true"]{box-shadow:0 0 0 4px #F2B544}
  .tool-icon{width:42px;height:42px;border:2px solid var(--line);background:#fff;color:var(--ink);font:inherit;font-size:1.25rem;font-weight:900;cursor:pointer;padding:0}
  .tool-icon:disabled{opacity:.35;cursor:not-allowed}
  .pen-size{display:flex;align-items:center;gap:7px;font-size:.8rem;font-weight:800;margin-left:auto}
  .pen-size input{width:110px}
  .canvas-wrap{aspect-ratio:16/9;border:2px solid var(--ink);background-color:#fff;background-image:linear-gradient(#E8EEF0 1px,transparent 1px),linear-gradient(90deg,#E8EEF0 1px,transparent 1px);background-size:28px 28px;overflow:hidden}
  canvas{display:block;width:100%;height:100%;touch-action:none;cursor:crosshair}
  .draw-save{background:var(--green);color:#fff;border:0;font:inherit;font-weight:800;padding:12px 20px;cursor:pointer}
  #draw-status{display:none;border-left:6px solid var(--yellow);background:#FFF4D6;padding:12px 15px;margin:12px 0}
  .fallback{margin:14px 0}.fallback textarea{width:100%;min-height:110px;font:inherit;line-height:1.6;padding:12px;border:2px solid var(--line);background:#fff;color:var(--ink);resize:vertical}
  .paper-check{display:flex;gap:10px;align-items:flex-start;margin:12px 0}.paper-check input{width:23px;height:23px;flex:0 0 auto}
  @media(max-width:620px){.pen-size{width:100%;margin-left:0}.pen-size input{flex:1}.canvas-wrap{aspect-ratio:4/3}.concept-box{font-size:.88rem}}
</style>
</head>
<body>
<nav class="top" id="site-nav"></nav>
<script src="course-data.js"></script>
<script src="nav.js"></script>
<main class="wrap" id="main-content">
  <header class="draw-head">
    <div class="hint" id="level"></div>
    <h1>Draw the idea</h1>
    <p class="sub" id="title"></p>
  </header>

  <div id="lesson-flow"></div>

  <section class="draw-prompt" aria-labelledby="draw-this">
    <h2 id="draw-this" style="margin:0 0 5px">Draw this</h2>
    <p id="idea" style="margin:0"></p>
    <div class="concept-chain" id="concept-chain" aria-label="Starter boxes and arrows"></div>
    <p class="hint" style="margin:.7em 0 0">Use boxes and arrows. Add one red note for what could go wrong.</p>
  </section>

  <section class="sketch-tool" aria-labelledby="sketch-heading">
    <h2 id="sketch-heading" style="margin:0 0 8px">Sketchpad</h2>
    <div class="sketch-toolbar">
      <fieldset class="color-tools">
        <legend>Pen</legend>
        <button class="swatch" type="button" data-color="#23313A" style="--swatch:#23313A" aria-label="Black pen" aria-pressed="true" title="Black pen"></button>
        <button class="swatch" type="button" data-color="#176C78" style="--swatch:#176C78" aria-label="Teal pen" aria-pressed="false" title="Teal pen"></button>
        <button class="swatch" type="button" data-color="#B33A3A" style="--swatch:#B33A3A" aria-label="Red risk pen" aria-pressed="false" title="Red risk pen"></button>
        <button class="swatch" type="button" data-color="#247A4B" style="--swatch:#247A4B" aria-label="Green success pen" aria-pressed="false" title="Green success pen"></button>
        <button class="swatch" type="button" data-color="#2D7ECF" style="--swatch:#2D7ECF" aria-label="Blue context pen" aria-pressed="false" title="Blue context pen"></button>
      </fieldset>
      <button class="tool-icon" id="undo" type="button" aria-label="Undo last stroke" title="Undo last stroke">↶</button>
      <button class="tool-icon" id="clear" type="button" aria-label="Clear sketch" title="Clear sketch">×</button>
      <label class="pen-size" for="pen-size">Size <input id="pen-size" type="range" min="2" max="12" value="4"></label>
    </div>
    <div class="canvas-wrap"><canvas id="sketch" width="960" height="540" aria-label="Lesson drawing canvas. A text and paper alternative is below."></canvas></div>
    <p class="hint" id="autosave" role="status" aria-live="polite" style="margin:.5em 0 0">Your sketch saves after each stroke.</p>
  </section>

  <details class="fallback"><summary>Draw on paper or describe it in words</summary><div class="body">
    <label class="paper-check"><input id="paper" type="checkbox"><span><b>I drew it on paper</b><br><span class="hint">Use this instead of the sketchpad.</span></span></label>
    <label for="description"><b>Text alternative</b> <span class="hint">Describe your boxes and arrows.</span></label>
    <textarea id="description" placeholder="Box A points to Box B because..."></textarea>
  </div></details>

  <button class="draw-save" id="complete" type="button">Save draw step</button>
  <div id="draw-status" role="status" aria-live="polite" tabindex="-1"></div>
  <div id="next-step"></div>
</main>
<script>
(function(){
  var params=new URLSearchParams(location.search),C=window.CCAF_COURSE;
  var u=params.get("unit")||(window.CCAF?CCAF.cur():"w1"),unit=C&&C.map?C.map[u]:null;
  if(!unit){u="w1";unit=C.map[u];}
  document.title="Draw: "+unit.title;
  document.getElementById("level").textContent=unit.level;
  document.getElementById("title").textContent=unit.title;
  document.getElementById("idea").textContent=unit.one;
  if(window.CCAFFlow)CCAFFlow.mount("lesson-flow",{unit:u,stage:"draw"});

  var concepts=(unit.concepts||[]).slice(0,4),chain=document.getElementById("concept-chain");
  concepts.forEach(function(concept,index){
    if(index){var arrow=document.createElement("span");arrow.className="concept-arrow";arrow.textContent="→";arrow.setAttribute("aria-hidden","true");chain.appendChild(arrow);}
    var box=document.createElement("span");box.className="concept-box";box.textContent=concept;chain.appendChild(box);
  });

  var key="ccaf-draw-"+u,state={strokes:[],description:"",paper:false,color:"#23313A",width:4};
  try{var old=JSON.parse(localStorage.getItem(key)||"{}");if(old&&typeof old==="object")state=Object.assign(state,old);}catch(e){}
  if(!Array.isArray(state.strokes))state.strokes=[];
  state.strokes=state.strokes.slice(0,500).map(function(stroke){
    var points=Array.isArray(stroke.points)?stroke.points.slice(0,5000).filter(function(point){return point&&Number.isFinite(point.x)&&Number.isFinite(point.y);}).map(function(point){return {x:Math.max(0,Math.min(1,point.x)),y:Math.max(0,Math.min(1,point.y))};}):[];
    return {color:/^#[0-9A-Fa-f]{6}$/.test(stroke.color||"")?stroke.color:"#23313A",width:Math.max(2,Math.min(12,Number(stroke.width)||4)),points:points};
  }).filter(function(stroke){return stroke.points.length;});

  var canvas=document.getElementById("sketch"),ctx=canvas.getContext("2d"),active=null;
  var description=document.getElementById("description"),paper=document.getElementById("paper"),autosave=document.getElementById("autosave");
  description.value=state.description||"";paper.checked=!!state.paper;
  document.getElementById("pen-size").value=String(Math.max(2,Math.min(12,Number(state.width)||4)));
  function persist(message){state.description=description.value;state.paper=paper.checked;localStorage.setItem(key,JSON.stringify(state));if(message)autosave.textContent=message;}
  function redraw(){ctx.clearRect(0,0,canvas.width,canvas.height);state.strokes.forEach(function(stroke){if(stroke.points.length<1)return;ctx.beginPath();ctx.strokeStyle=stroke.color;ctx.lineWidth=stroke.width;ctx.lineCap="round";ctx.lineJoin="round";ctx.moveTo(stroke.points[0].x*canvas.width,stroke.points[0].y*canvas.height);for(var i=1;i<stroke.points.length;i++)ctx.lineTo(stroke.points[i].x*canvas.width,stroke.points[i].y*canvas.height);ctx.stroke();});document.getElementById("undo").disabled=!state.strokes.length;}
  function point(event){var rect=canvas.getBoundingClientRect();return {x:Math.max(0,Math.min(1,(event.clientX-rect.left)/rect.width)),y:Math.max(0,Math.min(1,(event.clientY-rect.top)/rect.height))};}
  canvas.addEventListener("pointerdown",function(event){if(event.pointerType==="mouse"&&event.button!==0)return;event.preventDefault();canvas.setPointerCapture(event.pointerId);if(state.strokes.length>=500)state.strokes.shift();active={color:state.color,width:state.width,points:[point(event)]};state.strokes.push(active);redraw();});
  canvas.addEventListener("pointermove",function(event){if(!active)return;event.preventDefault();if(active.points.length<5000)active.points.push(point(event));redraw();});
  function endStroke(){if(!active)return;active=null;persist("Sketch saved.");}
  canvas.addEventListener("pointerup",endStroke);canvas.addEventListener("pointercancel",endStroke);
  document.querySelectorAll(".swatch").forEach(function(button){button.addEventListener("click",function(){state.color=button.getAttribute("data-color");document.querySelectorAll(".swatch").forEach(function(item){item.setAttribute("aria-pressed",String(item===button));});persist();});if(button.getAttribute("data-color")===state.color)button.setAttribute("aria-pressed","true");else button.setAttribute("aria-pressed","false");});
  document.getElementById("pen-size").addEventListener("input",function(event){state.width=Number(event.target.value);persist();});
  document.getElementById("undo").addEventListener("click",function(){state.strokes.pop();redraw();persist("Last stroke removed.");});
  document.getElementById("clear").addEventListener("click",function(){if(!state.strokes.length||confirm("Clear this sketch?")){state.strokes=[];redraw();persist("Sketch cleared.");}});
  var textTimer=null;description.addEventListener("input",function(){clearTimeout(textTimer);textTimer=setTimeout(function(){persist("Text description saved.");},300);});paper.addEventListener("change",function(){persist("Paper choice saved.");});window.addEventListener("pagehide",function(){clearTimeout(textTimer);persist();});

  function showNext(){if(window.CCAFFlow){CCAFFlow.mount("lesson-flow",{unit:u,stage:"draw"});CCAFFlow.mountNext("next-step",u,{stage:"build",context:"Drawing saved.",label:"Next: build it"});}}
  document.getElementById("complete").addEventListener("click",function(){persist();var drew=state.strokes.some(function(stroke){return stroke.points.length>=3;}),described=description.value.trim().length>=30;
    var status=document.getElementById("draw-status");status.style.display="block";
    if(!drew&&!paper.checked&&!described){status.innerHTML="<b>Add a quick sketch first.</b><br>Use the sketchpad, tick the paper option, or write a short text description.";status.focus();return;}
    if(window.CCAF){CCAF.recordEvidence(u,"draw",{complete:true,mode:drew?"canvas":paper.checked?"paper":"text",strokeCount:state.strokes.length,description:description.value});CCAF.setStep(u,1,true);}
    status.style.borderLeftColor="var(--green)";status.style.background="#EAF7EF";status.innerHTML="<b>Draw step saved.</b> The sketch stays with this lesson.";showNext();status.focus();
  });
  redraw();if(window.CCAF&&CCAF.getSteps(u)[1])showNext();
})();
</script>
</body>
</html>
